url: https://laljeet.github.io/nwaa/

template:
  bootstrap: 5

home:
  title: An R interface to the USGS NWAA Data Companion
  description: >
    Download and parse model outputs from the USGS National Water Availability
    Assessment Data Companion web service.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

reference:
  - title: Catalog and discovery
    desc: Inspect available models, variables, and supported codes.
    contents:
      - nwaa_catalog
      - nwaa_wu_models
      - nwaa_wu_variables
      - nwaa_statecd
      - nwaa_intersection_types
      - nwaa_location_types

  - title: Water Use
    desc: Sectoral water use models (irrigation, public supply, thermoelectric) for both withdrawals and consumptive use.
    contents:
      - nwaa_water_use

  - title: Water Quantity
    desc: Atmospheric forcing and hydrologic ensemble models.
    contents:
      - nwaa_atmos
      - nwaa_hydro

  - title: Integrated Water Availability
    desc: Water budget and surface water supply and use index.
    contents:
      - nwaa_iwa

  - title: Lower-level interface
    desc: Send a pre-built query directly. Most users should use the family wrappers above.
    contents:
      - nwaa_get_data

articles:
  - title: Vignettes
    navbar: ~
    contents:
      - nwaa
      - water-use
